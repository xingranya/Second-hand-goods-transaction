<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2563eb",
                        "accent": "#f97316",
                        "background-light": "#f8fafc",
                        "background-dark": "#0f172a",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Lexend', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen">
<div class="max-w-[800px] mx-auto px-4 py-8">
<!-- Header -->
<header class="flex items-center justify-between mb-8">
<div class="flex items-center gap-4">
<button class="flex items-center justify-center w-10 h-10 rounded-full bg-white dark:bg-slate-800 shadow-sm border border-slate-200 dark:border-slate-700 hover:bg-slate-50 transition-colors">
<span class="material-symbols-outlined text-slate-600 dark:text-slate-300">arrow_back</span>
</button>
<h1 class="text-2xl font-bold tracking-tight">发布新物品</h1>
</div>
<div class="text-sm font-medium text-slate-500">草稿已保存 12:45</div>
</header>
<main class="space-y-6">
<!-- Image Upload Section -->
<section class="bg-white dark:bg-slate-800 p-6 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700">
<h3 class="text-lg font-bold mb-4 flex items-center gap-2"><span class="material-symbols-outlined text-primary">image</span> 上传图片</h3>
<div class="grid grid-cols-2 sm:grid-cols-4 gap-4">
<!-- Uploaded Item 1 -->
<div class="relative aspect-square rounded-xl overflow-hidden group">
<img class="w-full h-full object-cover" data-alt="Close up of a silver tablet device" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCRROwhJHPeu3g56cfHwppjQtUvMcvdcXhoJ030KLOZRC66PmIJUbLwjBmPH6-w853Zt3cnwyewSTvoz4biwwxs8WuzXU4UT5lnEoyUC5NRSCB7NT8CEJbnjYiu7PY1DrPYaRdRr9Be6YQUZCMTS4jbavgUJS1S_xdsqV41CEAJ7pnarmj_Tgue_LCCRRTV2kn-wmt-pxlyW0YTgS4OzbPF6qqPhpbMq5uzuwZA1aMT42yGwh9aMC9JY8CsJFhBibtN6W1GZv36K6hP"/>
<button class="absolute top-2 right-2 bg-black/50 text-white rounded-full p-1 hover:bg-red-500 transition-colors">
<span class="material-symbols-outlined text-sm">close</span>
</button>
</div>
<!-- Uploaded Item 2 -->
<div class="relative aspect-square rounded-xl overflow-hidden group">
<img class="w-full h-full object-cover" data-alt="Second hand laptop on a wooden desk" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCt2OKggXf-0nCZ0q5H4pzWZOLRRrA0oeT_Hu07b6phJWNFm6qsZ3jQHf65MKYHz-1ReA6j51yOMKamm1y2Vii091tqniiAgFqVBAYI5EGKe2ofdkk5mTBPwgkjDdJuJED5Zifu6EwU141_ZTpb2fg325_hf9TXXWzwqlXxAX8X_SVGzYWY9s0DMix4HQJL-JGbb_6E8q68XdBg8kY5v1Zfte9Yw9PST_LxAvTx8zQpwWchH2uPmY4LBhtkW3fVx3Z6_fYhoagPXHNB"/>
<button class="absolute top-2 right-2 bg-black/50 text-white rounded-full p-1 hover:bg-red-500 transition-colors">
<span class="material-symbols-outlined text-sm">close</span>
</button>
</div>
<!-- Placeholder/Add Button -->
<button class="aspect-square rounded-xl border-2 border-dashed border-slate-300 dark:border-slate-600 flex flex-col items-center justify-center gap-2 hover:border-primary hover:bg-primary/5 transition-all group">
<span class="material-symbols-outlined text-3xl text-slate-400 group-hover:text-primary">add_a_photo</span>
<span class="text-xs font-medium text-slate-500 group-hover:text-primary text-center px-2">添加图片 (最多9张)</span>
</button>
</div>
</section>
<!-- Core Info Section -->
<section class="bg-white dark:bg-slate-800 p-6 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 space-y-6">
<!-- Title -->
<div>
<label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">物品标题</label>
<input class="w-full h-14 px-4 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 focus:ring-2 focus:ring-primary focus:border-primary transition-all text-lg font-medium" placeholder="你想卖什么？（例如：iPad Pro 11英寸 2021）" type="text"/>
</div>
<!-- Price Row -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div>
<label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">当前价格</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-primary font-bold">¥</span>
<input class="w-full h-14 pl-8 pr-4 rounded-xl border-2 border-primary/30 bg-primary/5 dark:bg-primary/10 focus:ring-2 focus:ring-primary focus:border-primary transition-all text-xl font-bold text-primary" placeholder="0.00" type="number"/>
</div>
</div>
<div>
<label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2 text-slate-400">原价</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">¥</span>
<input class="w-full h-14 pl-8 pr-4 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 focus:ring-2 focus:ring-primary focus:border-primary transition-all text-slate-500" placeholder="0.00" type="number"/>
</div>
</div>
</div>
<!-- Category -->
<div>
<label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-3">类别</label>
<div class="flex gap-3 overflow-x-auto pb-2 scrollbar-hide">
<button class="px-5 py-2 rounded-full bg-primary text-white font-medium whitespace-nowrap">数码</button>
<button class="px-5 py-2 rounded-full bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 font-medium whitespace-nowrap hover:bg-slate-200 transition-colors">图书</button>
<button class="px-5 py-2 rounded-full bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 font-medium whitespace-nowrap hover:bg-slate-200 transition-colors">生活</button>
<button class="px-5 py-2 rounded-full bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 font-medium whitespace-nowrap hover:bg-slate-200 transition-colors">运动</button>
<button class="px-5 py-2 rounded-full bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 font-medium whitespace-nowrap hover:bg-slate-200 transition-colors">服装</button>
</div>
</div>
</section>
<!-- Description Section -->
<section class="bg-white dark:bg-slate-800 p-6 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700">
<label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-4">描述</label>
<textarea class="w-full min-h-[160px] p-4 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 focus:ring-2 focus:ring-primary focus:border-primary transition-all resize-none leading-relaxed" placeholder="在哪里买的？使用感受如何？是否有瑕疵或划痕？描述越详细，卖得越快哦！"></textarea>
<div class="mt-2 flex justify-end">
<span class="text-xs text-slate-400">0 / 1000 字</span>
</div>
</section>
<!-- Transaction Method Section -->
<section class="bg-white dark:bg-slate-800 p-6 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700">
<h3 class="text-sm font-semibold text-slate-700 dark:text-slate-300 mb-4">交易方式</h3>
<div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
<label class="flex items-center gap-3 p-4 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 cursor-pointer hover:border-primary/50 transition-colors">
<input checked="" class="w-5 h-5 rounded text-primary border-slate-300 focus:ring-primary" type="checkbox"/>
<span class="font-medium text-slate-700 dark:text-slate-200">自提</span>
</label>
<label class="flex items-center gap-3 p-4 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 cursor-pointer hover:border-primary/50 transition-colors">
<input class="w-5 h-5 rounded text-primary border-slate-300 focus:ring-primary" type="checkbox"/>
<span class="font-medium text-slate-700 dark:text-slate-200">当面交易</span>
</label>
<label class="flex items-center gap-3 p-4 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 cursor-pointer hover:border-primary/50 transition-colors">
<input class="w-5 h-5 rounded text-primary border-slate-300 focus:ring-primary" type="checkbox"/>
<span class="font-medium text-slate-700 dark:text-slate-200">快递</span>
</label>
</div>
</section>
<!-- Footer Action -->
<footer class="pt-6 pb-12">
<button class="w-full bg-accent hover:bg-accent/90 text-white font-bold text-lg py-5 rounded-xl shadow-lg shadow-accent/20 transition-all flex items-center justify-center gap-2 active:scale-[0.98]"><span class="material-symbols-outlined">rocket_launch</span> 立即发布</button>
<p class="text-center text-slate-400 text-xs mt-4">发布即表示您同意我们的 <a class="text-primary hover:underline" href="#">社区准则</a> 和 <a class="text-primary hover:underline" href="#">交易条款</a>。</p>
</footer>
</main>
</div>
</body></html>
