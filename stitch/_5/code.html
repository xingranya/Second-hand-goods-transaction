<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>订单详情 | Campus Marketplace</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2563eb", // Academic Blue
                        "accent": "#f97316",  // Idle Orange
                        "background-light": "#f8fafc",
                        "background-dark": "#0f172a",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "0.75rem",
                        "xl": "1.25rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="max-w-3xl mx-auto pb-32">
<!-- Top Navigation -->
<header class="sticky top-0 z-50 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 px-6 py-4 flex items-center justify-between">
<div class="flex items-center gap-4">
<button class="p-2 hover:bg-slate-200 dark:hover:bg-slate-800 rounded-full transition-colors">
<span class="material-symbols-outlined align-middle">arrow_back</span>
</button>
<h1 class="text-xl font-bold tracking-tight">订单详情</h1>
</div>
<button class="p-2 hover:bg-slate-200 dark:hover:bg-slate-800 rounded-full transition-colors">
<span class="material-symbols-outlined align-middle">more_horiz</span>
</button>
</header>
<!-- Status Tracking -->
<section class="px-6 py-8">
<div class="relative flex justify-between items-start">
<!-- Line -->
<div class="absolute top-5 left-0 w-full h-0.5 bg-slate-200 dark:bg-slate-800 -z-10"></div>
<div class="absolute top-5 left-0 h-0.5 bg-primary -z-10 w-[75%] transition-all"></div>
<!-- Step 1 -->
<div class="flex flex-col items-center gap-2 group">
<div class="w-10 h-10 rounded-full bg-primary text-white flex items-center justify-center shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-sm">已下单</span>
</div>
<span class="text-xs font-semibold text-slate-500">已下单</span>
</div>
<!-- Step 2 -->
<div class="flex flex-col items-center gap-2 group">
<div class="w-10 h-10 rounded-full bg-primary text-white flex items-center justify-center shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-sm">已付款</span>
</div>
<span class="text-xs font-semibold text-slate-500">已付款</span>
</div>
<!-- Step 3 -->
<div class="flex flex-col items-center gap-2 group">
<div class="w-10 h-10 rounded-full bg-primary text-white flex items-center justify-center shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-sm">已发货</span>
</div>
<span class="text-xs font-semibold text-slate-500">已发货</span>
</div>
<!-- Step 4 (Current) -->
<div class="flex flex-col items-center gap-2 group">
<div class="w-10 h-10 rounded-full bg-white dark:bg-slate-900 border-4 border-primary text-primary flex items-center justify-center ring-4 ring-primary/10">
<span class="material-symbols-outlined text-sm">待收货</span>
</div>
<span class="text-xs font-bold text-primary">待收货</span>
</div>
<!-- Step 5 -->
<div class="flex flex-col items-center gap-2 group">
<div class="w-10 h-10 rounded-full bg-slate-200 dark:bg-slate-800 text-slate-400 flex items-center justify-center">
<span class="material-symbols-outlined text-sm">待评价</span>
</div>
<span class="text-xs font-semibold text-slate-400">待评价</span>
</div>
</div>
</section>
<div class="px-6 space-y-6">
<!-- Security Notice -->
<div class="bg-accent/10 border border-accent/20 rounded-xl p-4 flex gap-4 items-start">
<div class="bg-accent text-white p-2 rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-lg">shield_person</span>
</div>
<div class="flex-1">
<h4 class="text-accent font-bold text-sm">校园交易安全提醒</h4>
<p class="text-slate-700 dark:text-slate-300 text-sm leading-relaxed mt-1">请务必选择在校内公共场所进行面交，切勿在平台外直接转账或私下交易。</p>
<a class="text-accent text-xs font-bold mt-2 inline-flex items-center gap-1 hover:underline" href="#">查看校园安全交易指南 <span class="material-symbols-outlined text-[14px]">arrow_forward</span></a>
</div>
</div>
<!-- Item Snapshot Card -->
<div class="bg-white dark:bg-slate-900 rounded-xl p-5 shadow-sm border border-slate-200 dark:border-slate-800">
<div class="flex justify-between items-center mb-4">
<span class="text-xs font-bold uppercase tracking-wider text-slate-400">订单快照</span>
<span class="bg-primary/10 text-primary text-[10px] font-bold px-2 py-0.5 rounded-full uppercase">认证商品</span>
</div>
<div class="flex gap-5">
<div class="w-24 h-24 rounded-lg bg-slate-100 dark:bg-slate-800 overflow-hidden flex-shrink-0">
<img alt="Textbook" class="w-full h-full object-cover" data-alt="Modern engineering textbook lying on a desk" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD3Go69QGD1EebNYkp35uitB-htxWMd6y5WWpR1PGn08O3u97qpg-gb1f4PQjoUC0Et2kphrXI5F58V-f3SIgkx-FJt9RDJtZDc_w9m1rdBq_19iwLyac-6NXtKUJlvl1bPhXVxhe5XxtTddhohn5eLbhktpRjGdLysTUbrfAyStopeqBS9r3W1HYMWIxHul_Jd41iOQIjaOhA_loujX6-BpFD817vwKqxOL18hxvVctcjfexUWOQ6qGVvOPkyiwz7LjIlSzo7tv7oZ"/>
</div>
<div class="flex flex-col justify-between py-1">
<div>
<h3 class="font-bold text-lg leading-tight text-slate-900 dark:text-slate-100">Advanced Engineering Mathematics</h3>
<p class="text-slate-500 text-sm mt-1">成色：<span class="text-primary font-medium italic">九九新</span></p>
</div>
<p class="text-2xl font-black text-slate-900 dark:text-slate-100">$45.00</p>
</div>
</div>
</div>
<!-- Seller Contact & Order Info -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<!-- Seller Contact -->
<div class="bg-white dark:bg-slate-900 rounded-xl p-5 shadow-sm border border-slate-200 dark:border-slate-800 flex items-center justify-between">
<div class="flex items-center gap-3">
<div class="w-12 h-12 rounded-full bg-slate-200 dark:bg-slate-700 overflow-hidden ring-2 ring-background-light dark:ring-background-dark">
<img alt="Seller Avatar" class="w-full h-full object-cover" data-alt="Portrait of a university student smiling" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCuyv9PGWgYqmM2HIh7qZXr-iQzj-ad_BWOgmaS2bvtQ7l3Uh7XEg6bWCTdv8tJn3m3m7njzYBPY43IbqGVioHWc8JS6u3QTSIt7SxqLvGjT5zJcHTNDgR6_6pwiEpaKtosvrfFXrdmxvm8c5fs2ZM3Jh8BJ8HC_oInEB65bqMfEqP4ltVB1W3o1G8gHWTNHqJXxTGVe6YIyJiOzxUKl4t9iBb3IaKsjt4Qiq3eJ-41IJO3TygxTkLRtZaqnYvvqIoeSrVvhhltyiwE"/>
</div>
<div>
<p class="text-xs text-slate-500 font-medium">卖家</p>
<p class="font-bold">Alex Johnson</p>
</div>
</div>
<button class="bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-200 px-4 py-2 rounded-lg font-bold text-sm transition-colors flex items-center gap-2"><span class="material-symbols-outlined text-lg">chat_bubble</span>联系卖家</button>
</div>
<!-- Basic Order Info Card -->
<div class="bg-white dark:bg-slate-900 rounded-xl p-5 shadow-sm border border-slate-200 dark:border-slate-800">
<h4 class="text-xs font-bold uppercase tracking-wider text-slate-400 mb-4">交易信息</h4>
<div class="space-y-3">
<div class="flex justify-between text-sm">
<span class="text-slate-500">订单编号</span>
<span class="font-mono text-slate-700 dark:text-slate-300">ORD-2024-88392</span>
</div>
<div class="flex justify-between text-sm">
<span class="text-slate-500">成交时间</span>
<span class="text-slate-700 dark:text-slate-300">Oct 24, 2024 14:32</span>
</div>
<div class="flex justify-between text-sm">
<span class="text-slate-500">支付方式</span>
<span class="flex items-center gap-1 text-primary font-medium"><span class="material-symbols-outlined text-sm">verified_user</span> 平台资金担保</span>
</div>
</div>
</div>
</div>
</div>
<!-- Action Area (Fixed Bottom) -->
<div class="fixed bottom-0 left-0 right-0 bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 p-4 md:p-6 shadow-[0_-8px_30px_rgb(0,0,0,0.04)] z-50">
<div class="max-w-3xl mx-auto flex flex-wrap items-center justify-between gap-4">
<div class="flex items-center gap-2 overflow-x-auto no-scrollbar">
<button class="whitespace-nowrap px-4 py-2.5 rounded-lg border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300 text-sm font-semibold hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">申请退款</button>
<button class="whitespace-nowrap px-4 py-2.5 rounded-lg border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300 text-sm font-semibold hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">延长收货</button>
<button class="whitespace-nowrap px-4 py-2.5 rounded-lg border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300 text-sm font-semibold hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">查看物流</button>
</div>
<button class="flex-1 md:flex-none bg-primary hover:bg-primary/90 text-white px-8 py-3 rounded-xl font-bold text-base shadow-lg shadow-primary/30 transition-all flex items-center justify-center gap-2">确认收货</button>
</div>
</div>
</div>
<style>
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</body></html>
